# ─────────────────────────────────────────────────────────────────────────────
# savage – Docker Compose
#
# Services
#   mosquitto  – MQTT broker              (ports 1883, 9001-ws)
#   influxdb   – time-series database     (port 8086)
#   node-red   – flow-based server        (port 1880)
#   grafana    – dashboards               (port 3000)
#
# Prerequisites
#   1. Copy .env.example to .env and fill in real credentials.
#   2. On Intel/x86 hosts, enable ARM64 emulation once:
#        docker run --privileged --rm tonistiigi/binfmt --install arm64
#   3. Use `make dev` — it seeds .env and prints service URLs.
# ─────────────────────────────────────────────────────────────────────────────
services:
  # ── Mosquitto MQTT Broker ──────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    platform: linux/arm64
    container_name: savage-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT
      - "9001:9001" # MQTT over WebSockets
    volumes:
      - ./services/mosquitto/config:/mosquitto/config:ro
      - ./services/mosquitto/data:/mosquitto/data
      - ./services/mosquitto/log:/mosquitto/log
    networks:
      - savage-net
    healthcheck:
      test:
        [
          "CMD",
          "mosquitto_pub",
          "-h",
          "localhost",
          "-t",
          "healthcheck",
          "-m",
          "ping",
          "--quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── InfluxDB ───────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    platform: linux/arm64
    container_name: savage-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086" # InfluxDB HTTP API + UI
    volumes:
      - ./services/influxdb/data:/var/lib/influxdb2
    environment:
      - TZ=${TZ:-UTC}
      # One-time initialisation — ignored on subsequent starts once the
      # data directory is populated.
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASS:-changeme00}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-savage}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-timeseries}
      # Static admin token – set once and reuse; required for Grafana + Node-RED
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN:-savage-influx-token}
    networks:
      - savage-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Node-RED ───────────────────────────────────────────────────────────────
  node-red:
    build:
      context: ./services/node-red
      dockerfile: Dockerfile
    platform: linux/arm64
    image: savage-node-red:latest
    container_name: savage-node-red
    restart: unless-stopped
    ports:
      - "1880:1880" # Node-RED editor + HTTP-in nodes
    volumes:
      # Ephemeral runtime data: context store, node configs, etc.
      # Wiped by `make clean`; does NOT contain the flow file.
      - ./services/node-red/data:/data
      # Flow file lives here — version-controlled, never wiped by `make clean`.
      # Node-RED reads and writes flows.json (and flows_cred.json) directly here.
      - ./services/node-red/flows:/flows
    environment:
      - TZ=${TZ:-UTC}
      # Override the image default (FLOWS=flows.json). The entrypoint passes this
      # as a CLI argument which takes precedence over flowFile in settings.js.
      - FLOWS=/flows/flows.json
      # InfluxDB connection — consumed by settings.js functionGlobalContext
      - INFLUX_URL=${INFLUX_URL:-http://influxdb:8086}
      - INFLUX_TOKEN=${INFLUX_TOKEN:-savage-influx-token}
      - INFLUX_ORG=${INFLUX_ORG:-savage}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-timeseries}
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - savage-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    platform: linux/arm64
    container_name: savage-grafana
    restart: unless-stopped
    ports:
      - "3000:3000" # Grafana web UI
    volumes:
      - ./services/grafana/data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - TZ=${TZ:-UTC}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
      # InfluxDB credentials forwarded for datasource provisioning
      - INFLUX_URL=${INFLUX_URL:-http://influxdb:8086}
      - INFLUX_TOKEN=${INFLUX_TOKEN:-savage-influx-token}
      - INFLUX_ORG=${INFLUX_ORG:-savage}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-timeseries}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - savage-net

# ── Shared network ─────────────────────────────────────────────────────────
networks:
  savage-net:
    driver: bridge
