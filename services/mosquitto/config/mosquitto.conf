# ─────────────────────────────────────────────────────────────────────────────
# Mosquitto MQTT Broker – savage
#
# Listens on the standard MQTT port (1883) for SEN66 sensor data.
# Username/password authentication is required. The password file is
# (re)generated by `make dev` from MQTT_USER / MQTT_PASS in .env.
# ─────────────────────────────────────────────────────────────────────────────

# ── Listener ─────────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

# ── WebSocket listener (useful for browser-based MQTT clients / debugging) ───
listener 9001
protocol websockets

# ── Auth ─────────────────────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ──────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
