# ─────────────────────────────────────────────────────────────────────────────
# Mosquitto MQTT Broker – savage
#
# Listens on the standard MQTT port (1883) for SEN66 sensor data.
# Anonymous connections are allowed for development; add a password file
# and set allow_anonymous false for production.
# ─────────────────────────────────────────────────────────────────────────────

# ── Listener ─────────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

# ── WebSocket listener (useful for browser-based MQTT clients / debugging) ───
listener 9001
protocol websockets

# ── Auth (development: open; flip for production) ────────────────────────────
allow_anonymous true
# password_file /mosquitto/config/passwd

# ── Persistence ──────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
